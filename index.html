<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAULET | OFFICIAL BIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ffcc;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100%;
        }

        /* ПРЕЛОАДЕР (АНИМАЦИЯ ВХОДА) */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-in-out;
        }

        .loader-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite alternate, glow 2s infinite;
        }

        @keyframes pulse {
            from { opacity: 0.2; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px var(--accent); }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--accent); }
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            width: 0;
            height: 100%;
            background: var(--accent);
            animation: load 4s forwards;
        }

        @keyframes load {
            0% { width: 0; }
            100% { width: 100%; }
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-content {
            opacity: 0;
            transition: opacity 1.5s ease;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .bio-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .avatar-box {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar-box i {
            font-size: 80px;
            color: var(--accent);
            filter: drop-shadow(0 0 15px var(--accent));
        }

        .info-grid {
            text-align: left;
            margin-top: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            transition: 0.4s;
            border-left: 3px solid transparent;
        }

        .info-row:hover {
            background: rgba(0, 255, 204, 0.1);
            border-left: 3px solid var(--accent);
            transform: translateX(10px);
        }

        .info-row i {
            margin-right: 15px;
            color: var(--accent);
            width: 25px;
            text-align: center;
        }

        .label {
            font-weight: bold;
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-right: 10px;
        }

        .value {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.85rem;
            color: #fff;
        }

        /* ЛАЙКИ И ПРОСМОТРЫ */
        .stats-footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }

        .like-btn {
            cursor: pointer;
            transition: 0.3s;
            color: #ff4757;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .like-btn:hover { transform: scale(1.2); }
        .views-count { color: var(--accent); display: flex; align-items: center; gap: 5px; }

        /* КНОПКИ */
        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--accent);
            transition: 0.4s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 25px var(--accent);
        }

        /* ЭФФЕКТ ЧАСТИЦ */
        .click-effect {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            animation: clickAnim 0.6s ease-out forwards;
        }

        @keyframes clickAnim {
            to { transform: scale(5); opacity: 0; }
        }
    </style>
</head>
<body onclick="spawnEffect(event)">

    <div id="preloader">
        <div class="loader-text">D A U L E T</div>
        <div style="font-size: 0.8rem; margin-top: 10px; color: #555;">WELCOME TO BIOGRAPHY...</div>
        <div class="loader-bar"></div>
    </div>

    <div id="main-content">
        <div class="bio-card">
            <div class="avatar-box">
                <i class="fas fa-ghost"></i>
            </div>

            <div class="info-grid">
                <div class="info-row"><i class="fas fa-signature"></i> <span class="label">Name:</span> <span class="value">Dᴀulᴇᴛ👤</span></div>
                <div class="info-row"><i class="fas fa-user-friends"></i> <span class="label">Friends:</span> <span class="value">(ᴄᴋᴩыᴛᴏ)</span></div>
                <div class="info-row"><i class="fas fa-id-badge"></i> <span class="label">Accounts:</span> <span class="value">@dauletbr, @HETY_HOMEP</span></div>
                <div class="info-row"><i class="fas fa-project-diagram"></i> <span class="label">Projects:</span> <span class="value">soon</span></div>
                <div class="info-row"><i class="fas fa-microphone-alt"></i> <span class="label">Studio:</span> <span class="value">Soon</span></div>
                <div class="info-row"><i class="fas fa-terminal"></i> <span class="label">Def:</span> <span class="value">no</span></div>
                <div class="info-row"><i class="fas fa-map-marker-alt"></i> <span class="label">Country:</span> <span class="value">Kᴀzᴀᴋhsᴛᴀn🇰🇿</span></div>
                <div class="info-row"><i class="fas fa-code"></i> <span class="label">Hobby:</span> <span class="value">иɜучᴀᴛь #ᴩᴀwn</span></div>
            </div>

            <div class="stats-footer">
                <div class="views-count">
                    <i class="fas fa-eye"></i> <span id="v-count">0</span>
                </div>
                <div class="like-btn" onclick="addLike()">
                    <i class="fas fa-heart"></i> <span id="l-count">0</span>
                </div>
            </div>

            <div class="btn-container">
                <a href="https://t.me/HETY_HOMEP" class="btn"><i class="fab fa-telegram"></i> TG</a>
                <a href="https://vk.com/dauletchik" class="btn"><i class="fab fa-vk"></i> VK</a>
            </div>
        </div>
    </div>

    <script>
        // Скрипт прелоадера и логики статистики
        window.addEventListener('load', () => {
            // Санауыштарды жүктеу
            let views = localStorage.getItem('daulet_views') || 0;
            views++;
            localStorage.setItem('daulet_views', views);
            document.getElementById('v-count').innerText = views;

            let likes = localStorage.getItem('daulet_likes') || 0;
            document.getElementById('l-count').innerText = likes;

            setTimeout(() => {
                const loader = document.getElementById('preloader');
                const main = document.getElementById('main-content');
                
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    main.style.opacity = '1';
                    document.body.style.overflow = 'auto';
                }, 1000);
            }, 4000); 
        });

        function addLike() {
            let likes = localStorage.getItem('daulet_likes') || 0;
            likes++;
            localStorage.setItem('daulet_likes', likes);
            document.getElementById('l-count').innerText = likes;
            
            // Жүрек атылу эффектісі
            const btn = document.querySelector('.like-btn');
            btn.style.transform = 'scale(1.5)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
        }

        // Эффект клика
        function spawnEffect(e) {
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.style.left = e.pageX - 5 + 'px';
            effect.style.top = e.pageY - 5 + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 600);
        }
    </script>
</body>
</html>
