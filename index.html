<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daulet Bio Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Эффект частиц при клике */
        .particle {
            position: absolute;
            pointer-events: none;
            background: var(--primary);
            border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; transform: translate(var(--x), var(--y)); }
        }

        .card {
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary), inset 0 0 10px var(--primary);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--primary);
            margin-bottom: 25px;
            color: var(--primary);
        }

        .stats {
            text-align: left;
            margin-bottom: 20px;
        }

        .row {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            font-size: 1rem;
            transition: 0.3s;
        }

        .row:hover {
            background: rgba(0, 242, 255, 0.1);
            transform: translateX(10px);
        }

        .icon-anim {
            font-size: 1.3rem;
            margin-right: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .label { color: var(--primary); font-weight: bold; margin-right: 10px; }
        .val { color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; }

        .links { display: flex; gap: 10px; margin-top: 20px; }

        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--primary);
            border-radius: 5px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: 0.3s;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        /* Плеер */
        .player {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .play-btn {
            cursor: pointer;
            color: var(--primary);
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .play-btn:hover { transform: scale(1.2); }

        .viz {
            display: flex;
            gap: 3px;
        }

        .bar {
            width: 3px;
            height: 15px;
            background: var(--primary);
            animation: wave 1s infinite;
        }

        @keyframes wave {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }
    </style>
</head>
<body onclick="createParticle(event)">

<div class="card">
    <h1>📝 Dᴏʙʀᴀ Pᴏᴢʜᴀʟᴏᴠᴀᴛ' Nᴀ Bɪᴏ Dᴀᴜʟᴇᴛᴀ ✅</h1>

    <div class="stats">
        <div class="row"><span class="icon-anim">🪪</span> <span class="label">𝙉𝙖𝙢𝙚:</span> <span class="val">Dᴀulᴇᴛ👤</span></div>
        <div class="row"><span class="icon-anim">😅</span> <span class="label">𝐅𝐫𝐢𝐞𝐧𝐝𝐬:</span> <span class="val">(ᴄᴋᴩыᴛᴏ)</span></div>
        <div class="row"><span class="icon-anim">🆔</span> <span class="label">ᴀᴄᴄᴀᴏunᴛ:</span> <span class="val">@dauletbr, @HETY_HOMEP</span></div>
        <div class="row"><span class="icon-anim">🏹</span> <span class="label">𝙈𝙮 𝙥𝙧𝙤𝙟𝙚𝙘𝙩:</span> <span class="val">soon</span></div>
        <div class="row"><span class="icon-anim">🎙</span> <span class="label">My Sᴛudiᴏ:</span> <span class="val">Soon</span></div>
        <div class="row"><span class="icon-anim">😀</span> <span class="label">𝙙𝙚𝙛:</span> <span class="val">no</span></div>
        <div class="row"><span class="icon-anim">😼</span> <span class="label">Cᴏunᴛry:</span> <span class="val">Kᴀzᴀᴋhsᴛᴀn🇰🇿</span></div>
        <div class="row"><span class="icon-anim">🧬</span> <span class="label">Хᴏбби:</span> <span class="val">иɜучᴀᴛь #ᴩᴀwn</span></div>
    </div>

    <div class="links">
        <a href="https://t.me/HETY_HOMEP" class="btn" target="_blank">Telegram</a>
        <a href="https://vk.com/dauletchik" class="btn" target="_blank">VKontakte</a>
    </div>

    <div class="player">
        <div class="play-btn" id="playBtn" onclick="toggleMusic()"><i class="fas fa-play-circle"></i></div>
        <div class="viz">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
        </div>
        <span style="font-size: 0.7rem; color: var(--primary);">PHONK DRIVE.MP3</span>
    </div>
</div>

<audio id="myAudio" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    // Музыка
    const audio = document.getElementById('myAudio');
    const playBtn = document.getElementById('playBtn');
    let isPlaying = false;

    function toggleMusic() {
        if (isPlaying) {
            audio.pause();
            playBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
        } else {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
        }
        isPlaying = !isPlaying;
    }

    // Частицы при клике
    function createParticle(e) {
        for (let i = 0; i < 8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            
            const x = (Math.random() - 0.5) * 200;
            const y = (Math.random() - 0.5) * 200;
            
            p.style.setProperty('--x', x + 'px');
            p.style.setProperty('--y', y + 'px');
            p.style.width = Math.random() * 8 + 'px';
            p.style.height = p.style.width;
            
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    }
</script>

</body>
</html>
